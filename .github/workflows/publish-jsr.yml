# Publishes the package to JSR (jsr.io) using GitHub OIDC — no tokens.
# Triggered by pushing a version tag (e.g. `v1.0.0`), or manually.
# The version published is the one in jsr.json; tag it to release.
name: Publish (JSR)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-jsr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token used to authenticate with JSR — no NPM_TOKEN needed.

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Publish to JSR
        run: npx jsr publish
